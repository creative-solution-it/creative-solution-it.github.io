<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creative Solution Digital</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 700px;
      padding: 20px;
    }

    h1 {
      font-size: 40px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      color: #cbd5e1;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 24px;
      background: #38bdf8;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }

    .btn:hover {
      background: #0ea5e9;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Creative Solution Digital</h1>
    <p>Costruiamo siti moderni, veloci e pronti per il futuro.</p>

    <button class="btn" onclick="alert('Sito funzionante 🚀')">
      Scopri di più
    </button>
  </div>

</body>
</html>
